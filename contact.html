<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santiago Chonate | Contact</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: "Courier New", monospace;
      background: #f3f3f3;
      color: #111;
      line-height: 1.8;
    }

    nav {
      width: 100%;
      border-top: 8px solid #111;
      background: #f3f3f3;
    }

    .nav-container {
      max-width: 1100px;
      margin: auto;
      padding: 22px 20px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 15px;
    }

    .nav-container a {
      text-decoration: none;
      color: #111;
    }

    .nav-container a:hover {
      color: #0b57d0;
    }

    .separator {
      color: #111;
    }

    .section {
      max-width: 1100px;
      margin: auto;
      padding: 20px 20px 50px;
    }

    .title {
      text-align: center;
      font-size: 32px;
      margin-bottom: 45px;
      font-weight: bold;
    }

    .title span {
      border-left: 1px solid #111;
      border-right: 1px solid #111;
      padding: 0 15px;
      display: inline-block;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 26px;
    }

    .box {
      background: white;
      border: 1px solid #111;
      padding: 18px;
      margin-bottom: 14px;
    }

    .box.large {
      min-height: 120px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 11px 18px;
      border: 1px solid #111;
      color: #111;
      background: white;
      transition: 0.2s ease;
      font-size: 14px;
      margin-top: 8px;
    }

    .btn:hover {
      background: #111;
      color: white;
    }

    .info h3 {
      font-size: 30px;
      margin-bottom: 14px;
    }

    .info p {
      margin-bottom: 10px;
      color: #444;
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-container">
      <a href="index.html">@ Home</a>
      <span class="separator">|</span>
      <a href="works.html">@ Works</a>
      <span class="separator">|</span>
      <a href="about.html">@ About me</a>
      <span class="separator">|</span>
      <a href="contact.html">@ Contact</a>
    </div>
  </nav>

  <section class="section">
    <h1 class="title"><span>@ Contact</span></h1>

    <div class="contact-grid">
      <div>
        <div class="box">Nombre completo: Santiago Chonate Gamero</div>
        <div class="box">Correo: santiagochonate@upeu.edu.pe</div>
        <div class="box large">Disponible para oportunidades en clínicas, hospitales y empresas.</div>
        <a class="btn" href="https://wa.me/51924379424" target="_blank">Enviar mensaje</a>
      </div>

      <div class="info">
        <h3>Contacto</h3>
        <p>📞 +51 929 668 062</p>
        <p>✉️ santiagochonate@upeu.edu.pe</p>
        <p>📍 Perú</p>
      </div>
    </div>
  </section>

</body>
</html>
