<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Santiago Chonate | Home</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: "Courier New", monospace;
      color: #111;
      min-height: 100vh;
      background: url("fondo.png") no-repeat center center/cover;
      position: relative;
    }

    /* Capa blanca suavizada para que el azul no se vea celeste */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.55);
      z-index: -1;
    }

    nav {
      width: 100%;
      border-top: 8px solid #111;
      background: transparent;
    }

    .nav-container {
      max-width: 1100px;
      margin: auto;
      padding: 22px 20px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 15px;
    }

    .nav-container a {
      text-decoration: none;
      color: #111;
    }

    .nav-container a:hover {
      color: #0b57d0;
    }

    .separator {
      color: #111;
    }

    .hero {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .hero-box {
      max-width: 900px;
    }

    .hero h1 {
      font-size: 64px;
      margin-bottom: 20px;
      line-height: 1.1;
      color: #111;
    }

    .hero-info {
      max-width: 780px;
      margin: 30px auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: rgba(255,255,255,0.75);
      padding: 14px 18px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 10px;
    }

    .icon {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
    }

    .info-title {
      font-size: 19px;
      font-weight: bold;
      color: #111;
      margin-bottom: 4px;
    }

    .info-text {
      font-size: 15px;
      color: #444;
      margin: 0;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      text-decoration: none;
      padding: 13px 22px;
      border: 1px solid #111;
      color: #111;
      background: white;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #111;
      color: white;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 38px;
      }

      .info-title {
        font-size: 17px;
      }

      .info-text {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-container">
      <a href="index.html">@ Home</a>
      <span class="separator">|</span>
      <a href="works.html">@ Works</a>
      <span class="separator">|</span>
      <a href="about.html">@ About me</a>
      <span class="separator">|</span>
      <a href="contact.html">@ Contact</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-box">
      <h1>Hola, soy<br>Santiago Chonate</h1>

      <div class="hero-info">

        <div class="info-item">
          <svg class="icon" viewBox="0 0 24 24" fill="#2563eb" aria-hidden="true">
            <path d="M12 3 1 9l11 6 11-6-11-6Zm0 14L5 13.2V16l7 4 7-4v-2.8L12 17Z"/>
          </svg>
          <div>
            <p class="info-title">Administración y Negocios Internacionales</p>
            <p class="info-text">Bachiller - Universidad Peruana Unión</p>
          </div>
        </div>

        <div class="info-item">
          <svg class="icon" viewBox="0 0 24 24" fill="#059669" aria-hidden="true">
            <path d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-6v2h3v1H7v-1h3v-2H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm0 2v8h16V7H4Z"/>
          </svg>
          <div>
            <p class="info-title">Computación e Informática</p>
            <p class="info-text">Carrera culminada — Instituto de Educación Superior | CEPEA</p>
          </div>
        </div>

      </div>

      <a class="btn" href="contact.html">@ Contact</a>
    </div>
  </section>

</body>
</html>
