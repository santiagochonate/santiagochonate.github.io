<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santiago Chonate | Home</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: "Courier New", monospace;
      color: #111;
      min-height: 100vh;
      background: url("fondo.png") no-repeat center center/cover;
      position: relative;
    }

    /* capa blanca para que se vea profesional */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.88);
      z-index: -1;
    }

    nav {
      width: 100%;
      border-top: 8px solid #111;
      background: transparent;
    }

    .nav-container {
      max-width: 1100px;
      margin: auto;
      padding: 22px 20px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 15px;
    }

    .nav-container a {
      text-decoration: none;
      color: #111;
    }

    .nav-container a:hover {
      color: #0b57d0;
    }

    .separator {
      color: #111;
    }

    .hero {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .hero-box {
      max-width: 900px;
    }

    .hero h1 {
      font-size: 68px;
      margin-bottom: 20px;
      line-height: 1.1;
      color: #111;
      animation: fadeInOut 3s infinite;
    }

    .hero p {
      font-size: 24px;
      color: #333;
      margin-bottom: 16px;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      text-decoration: none;
      padding: 13px 22px;
      border: 1px solid #111;
      color: #111;
      background: white;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #111;
      color: white;
    }

    /* animación suave */
    @keyframes fadeInOut {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 42px;
      }

      .hero p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-container">
      <a href="index.html">@ Home</a>
      <span class="separator">|</span>
      <a href="works.html">@ Works</a>
      <span class="separator">|</span>
      <a href="about.html">@ About me</a>
      <span class="separator">|</span>
      <a href="contact.html">@ Contact</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-box">
      <h1>Hola, Soy<br>Santiago Chonate</h1>
      <p>Bachiller en Administración de Empresas y Negocios Internacionales</p>
      <p>Computación e Informática</p>
      <a class="btn" href="contact.html">@ Contact</a>
    </div>
  </section>

</body>
</html>
